apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-k8s-minimal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-k8s-minimal
  template:
    metadata:
      labels:
        app: go-k8s-minimal
    spec:
      containers:
        - name: app
          image: junhuiwu/go-k8s-minimal:0.2
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: go-k8s-minimal-config
                  key: APP_NAME
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: go-k8s-minimal-config
                  key: PORT